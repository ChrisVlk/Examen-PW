<!DOCTYPE html>
<html lang="es">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Tarjeta de Asignatura</title>
    <link href="https://cdn.jsdelivr.net/npm/bootstrap@5.3.0/dist/css/bootstrap.min.css" rel="stylesheet">
    <link rel="stylesheet" href="styles.css">
</head>
<body class="bg-light d-flex align-items-center min-vh-100 py-5">
    
    <main class="container">
        <div class="row justify-content-center">
            <div class="col-12 col-md-4">
                
                <article class="course-card">

                    <div class="card-content">
                        <h2 class="course-title">Programación Web</h2>

                        <div class="course-badges">
                            <span class="badge-item">ING-402</span>
                            <span class="badge-item">Gpo1</span>
                            <span class="badge-item">Aula E-201</span>
                        </div>

                        <a href="#" class="btn-action">Ingresar al Aula Virtual</a>

                </article>

            </div>
        </div>

</html>
